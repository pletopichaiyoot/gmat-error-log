services:
  db:
    image: pgvector/pgvector:pg16
    container_name: gmat-pg
    environment:
      POSTGRES_DB: gmat
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: gmat
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d gmat"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
